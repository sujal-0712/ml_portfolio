version: '3.8'

services:
  # =====================================================================
  # 1. CORE BACKEND ML PREDICTION ENGINE (FastAPI)
  # =====================================================================
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unified_ml_backend
    ports:
      - "8000:8000"
    volumes:
      # Live mounts your development code into the container
      - ./backend:/app
      # Prevents container-generated python artifacts from overwriting host files
      - /app/app/__pycache__
    environment:
      - PYTHONUNBUFFERED=1
      - ENV=production
    restart: always

  # =====================================================================
  # 2. CLIENT WEB INTERFACE & FORMS GATEWAY (Flask)
  # =====================================================================
  frontend-dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: unified_ml_frontend
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
      # Directs the Flask app proxy to talk to the backend container over internal DNS bridge
      - BACKEND_SERVICE_URL=http://backend-api:8000
    volumes:
      - ./frontend:/app
    # Tells Docker to ensure the FastAPI model server is completely up before booting the frontend UI
    depends_on:
      - backend-api
    restart: always